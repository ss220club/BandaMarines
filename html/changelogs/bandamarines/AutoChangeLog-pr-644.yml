author: "larentoun"
delete-after: True
changes:
  - bugfix: "Мотоцикл не может набирать скорость, крутясь на месте. Нужно движение вперед в течении 3-х секунд (как и задумывалось изначально)."
  - bugfix: "Мотоцикл теперь теряет скорость с максимальной на среднюю при поворотах."
  - balance: "Мотоцикл сбрасывает скорость при отпускании клавиши движения (grace period в 100мс)."
  - balance: "Ксеноморфы с более острыми когтями, чем базовые, могут грабом снимать с мотоцикла."
  - balance: "Большинство способностей оглушения теперь сбрасывают с мотоцикла."
  - balance: "Большинство способностей отбрасывания/притягивания теперь сбрасывают с мотоцикла и отбрасывают/притягивают в нужном направлении."